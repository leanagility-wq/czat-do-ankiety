services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: survey_chat
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: survey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
